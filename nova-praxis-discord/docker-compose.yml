services:
  # Bot runs locally (not in Docker) — needs Claude CLI on host
  # Start with: npx tsx src/index.ts
  # Or use: powershell -File start-bot.ps1

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: nova_praxis
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova_praxis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
